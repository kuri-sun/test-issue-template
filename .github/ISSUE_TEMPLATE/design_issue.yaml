name: Design Issue
description: Please report any design issues you encounter.
title: "[Design]: "
labels: ["design"]
projects: ["tadrill", "<NEW> Design tasks"]
assignees:
  -
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the following information to help us address your design issue.
  - type: input
    id: figma-link
    attributes:
      label: Figma Link
      description: Provide the corresponding Figma link for our quick reference here.
      placeholder: ex. https://www.figma.com/...
    validations:
      required: false
  - type: textarea
    id:
    attributes:
      label: The Procedure of Design Issue Management
      description: Please provide the steps for the design issue.
      placeholder:
      value: |
        1. **Step 1**:
        2. ...
    validations:
      required: true
